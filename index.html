<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta property="og:title" content="Juliano Martins Portfolio" />
    <meta property="og:type" content="portfolio" />
    <meta property="og:description" content="Mon portfolio">
    <meta property="og:image" content="src/img/selfie.jpg" />

    <link rel="stylesheet" href="src/css/index.css">
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>

    <title>Juliano Martins</title>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="burger-menu" id="burger-menu">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <ul id="nav-links">
                <li><a href="#" class="active">Accueil</a></li>
                <li><a href="#">Mes réalisations</a></li>
                <li><a href="#">Mes compétences</a></li>
                <li><a href="#">Me contacter</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="hero-section">
            <div class="hero-text">
                <h1>Juliano Martins</h1>
                <span id="type"></span>
            </div>
            <div class="selfie-container">
                <img src="src/img/selfie.png" alt="Selfie" class="selfie">
            </div>
            <div class="buttons-container">
                <a href="#" class="button-22">Mes réalisations</a>
                <a href="#">Mes compétences</a>
                <a href="#">Me contacter</a>
            </div>
            <div class="accroche">
                <a href="#">
                    Hacking the system,<br>one line at a time.
                </a>
            </div>
        </div>
    </main>    
    <script>
        var typed = new Typed('#type', {
          strings: ['Je suis un développeur web.', 'Je suis un lycéen.', 'Je suis passionné par le code.', 'Je suis un autodidacte.'],
          typeSpeed: 60,
          loop: true,
          loopCount: Infinity,
          showCursor: false,
          smartBackspace: true,
        });

        document.getElementById('burger-menu').addEventListener('click', function() {
            var navLinks = document.getElementById('nav-links');
            if (navLinks.style.display === 'block') {
                navLinks.style.display = 'none';
            } else {
                navLinks.style.display = 'block';
            }
        });
    </script>
</body>
</html>
